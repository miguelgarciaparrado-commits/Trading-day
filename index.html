function calcScore(ps, pats, jnl) {
    const t = ps.slOk + ps.slBroken;
    const s1 = t > 0 ? (ps.slOk / t) * 30 : 0;
    const tot = (ps.tpAuto || 0) + (ps.tpManual || 0) + (ps.earlyClose || 0);
    const s2 = tot > 0 ? ((ps.tpAuto || 0) + (ps.tpManual || 0)) / tot * 20 : 0;
    const s3 = Math.max(0, 20 - ps.revenge * 5);
    const s4 = Math.min(20, pats.filter(p => p.conf > 0).length * 7);
    const w = jnl.filter(j => j.type === "win").length;
    const l = jnl.filter(j => j.type === "lesson").length;
    const mis = jnl.filter(j => j.type === "mistake").length;
    const a = jnl.filter(j => j.type === "analysis").length;
    const s5 = Math.min(10, (w * 2) + (l * 1.5) + a + Math.min(mis, l) * 0.5);
    const bon = Math.min(5, jnl.filter(j => j.linkedClose).length * 1.5);
    return Math.min(100, Math.round(s1 + s2 + s3 + s4 + s5 + bon));
}

function generateProfileSummary(ps, pats, jnl, hist, xhist, sc) {
    const lines = [];
    const allHist = [...xhist, ...hist];
    const totalOps = allHist.length;
    const wins = allHist.filter(function (h) { return h.result > 0; }).length;
    const losses = allHist.filter(function (h) { return h.result < 0; }).length;
    const winRate = totalOps > 0 ? Math.round(wins / totalOps * 100) : 0;
    // Nivel general
    if (sc >= 80)
        lines.push("Operas con disciplina profesional. Tu gestion del riesgo es solida.");
    else if (sc >= 65)
        lines.push("Estas en la recta final hacia la consistencia. Los fundamentos son buenos.");
    else if (sc >= 50)
        lines.push("En transicion. Ves el camino correcto pero te cuesta mantenerlo.");
    else
        lines.push("Todavia hay patrones de comportamiento que te cuestan dinero.");
    // SL discipline
    const slTotal = ps.slOk + ps.slBroken;
    if (slTotal > 0) {
        const slRate = Math.round(ps.slOk / slTotal * 100);
        if (slRate === 100)
            lines.push("Respetas el Stop Loss en el 100% de las operaciones. Excelente.");
        else if (slRate >= 80)
            lines.push("Respetas el SL en el " + slRate + "% de casos. Queda margen de mejora en la disciplina.");
        else
            lines.push("Solo respetas el SL en el " + slRate + "% de casos. Esto es lo que mas dinero te cuesta.");
    }
    // Close behavior — tipos de cierre
    const totClose = (ps.tpAuto || 0) + (ps.tpManual || 0) + (ps.earlyClose || 0) + (ps.manualClose || 0);
    if (totClose > 0) {
        const tpPct = Math.round(((ps.tpAuto || 0) + (ps.tpManual || 0)) / totClose * 100);
        const earlyPct = Math.round((ps.earlyClose || 0) / totClose * 100);
        if (earlyPct > 40)
            lines.push("Cierras antes del objetivo el " + earlyPct + "% de las veces. Esto revela impaciencia o miedo a perder las ganancias.");
        else if (earlyPct > 20)
            lines.push("Cierras prematuramente en el " + earlyPct + "% de casos. Trabaja la confianza en tu propio plan.");
        else if (tpPct >= 60)
            lines.push("Alcanzas el objetivo en el " + tpPct + "% de los cierres. Buena ejecucion del plan.");
    }
    // Analisis de descripciones de cierre (jnl linkedClose)
    const closeDocs = jnl.filter(function (j) { return j.linkedClose; });
    const tpDocs = jnl.filter(function (j) { return j.linkedClose === "tp"; });
    const slDocs = jnl.filter(function (j) { return j.linkedClose === "sl"; });
    const manualDocs = jnl.filter(function (j) { return j.linkedClose === "manual"; });
    if (totClose > 0) {
        const docRate = Math.round(closeDocs.length / Math.max(totClose, 1) * 100);
        if (docRate === 0)
            lines.push("No documentas tus cierres. Sin reflexion post-cierre no hay aprendizaje.");
        else if (docRate >= 70)
            lines.push("Documentas el " + docRate + "% de tus cierres. La reflexion constante es la base del progreso.");
        else
            lines.push("Solo documentas el " + docRate + "% de tus cierres. Intenta escribir algo despues de cada operacion.");
    }
    // Calidad emocional en SL vs TP
    if (slDocs.length > 0) {
        const slLessons = slDocs.filter(function (j) { return j.type === "lesson" || j.type === "analysis"; }).length;
        const slMistakes = slDocs.filter(function (j) { return j.type === "mistake"; }).length;
        if (slLessons > slMistakes)
            lines.push("Conviertes los SL en aprendizaje (" + slLessons + " lecciones vs " + slMistakes + " errores). Mentalidad correcta.");
        else if (slMistakes > slLessons)
            lines.push("Los SL te afectan mas emocionalmente de lo ideal (" + slMistakes + " entradas de error). Trabaja la aceptacion de perdidas.");
    }
    if (manualDocs.length > 0) {
        const earlyWins = manualDocs.filter(function (j) { return j.type === "win"; }).length;
        const earlyLessons = manualDocs.filter(function (j) { return j.type === "lesson"; }).length;
        if (earlyWins > earlyLessons)
            lines.push("Clasificas tus cierres manuales como victorias. Asegurate de que realmente mejoran tu R/R.");
        else if (earlyLessons >= earlyWins && manualDocs.length > 2)
            lines.push("Reconoces que los cierres anticipados son una area de mejora. Buen autoconocimiento.");
    }
    // Revenge trading
    if (ps.revenge >= 3)
        lines.push("Alerta: has hecho trading de revancha " + ps.revenge + " veces. Es el patron mas destructivo.");
    else if (ps.revenge === 0)
        lines.push("Sin trading de revancha registrado. Muy buena senial de control emocional.");
    // Journal quality
    const victories = jnl.filter(function (j) { return j.type === "win"; }).length;
    const lessons = jnl.filter(function (j) { return j.type === "lesson"; }).length;
    const mistakes = jnl.filter(function (j) { return j.type === "mistake"; }).length;
    if (jnl.length === 0)
        lines.push("El diario esta vacio. Documentar cada operacion es clave para mejorar.");
    else if (lessons > mistakes)
        lines.push("Conviertes los errores en lecciones. Eso es lo que diferencia a un trader profesional.");
    else if (mistakes > lessons * 2)
        lines.push("Tienes muchos errores documentados sin su leccion correspondiente. Reflexiona mas.");
    // Patterns
    const confPats = pats.filter(function (p) { return p.conf > 0; });
    if (confPats.length > 0) {
        const bestPat = confPats.sort(function (a, b) {
            const ra = a.obs > 0 ? (a.conf / a.obs) : 0;
            const rb = b.obs > 0 ? (b.conf / b.obs) : 0;
            return rb - ra;
        })[0];
        const bestRate = bestPat.obs > 0 ? Math.round(bestPat.conf / bestPat.obs * 100) : 0;
        if (bestRate >= 70)
            lines.push("Tu patron mas fiable es '" + bestPat.name + "' con un " + bestRate + "% de acierto.");
    }
    // Win rate
    if (winRate >= 60)
        lines.push("Tasa de acierto del " + winRate + "%. Por encima de la media del mercado.");
    else if (winRate < 40)
        lines.push("Solo ganas el " + winRate + "% de las operaciones. Revisa tus criterios de entrada.");
    return lines;
}

function calcSRLevels(highs, lows, price) {

function detectPivots(highs, lows, win) {

        }

            pH.push({ x: i, y: highs[i] });

        sy += pts[i].y;
        sxy += pts[i].x * pts[i].y;
        sx2 += pts[i].x * pts[i].x;

    var denom = n * sx2 - sx * sx;
